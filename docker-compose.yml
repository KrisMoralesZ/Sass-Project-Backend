services:
  postgres:
    image: postgres:16-alpine
    container_name: sass-postgres
    restart: unless-stopped
    ports:
      - '5433:5433'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sass_project
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
